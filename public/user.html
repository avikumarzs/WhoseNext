<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <title>Live Dashboard</title>
    <style>
        /* --- 1. LOADING OVERLAY STYLES --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loader { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-text { color: white; font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 2px; animation: pulse 1.5s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- 2. DEFAULT TV / DESKTOP DASHBOARD --- */
        /* Locks the body so the header never scrolls away on a TV */
        body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .main-content { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr 380px; gap: 25px; overflow: hidden; }
        
        .active-section { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .queue-section { background: var(--bg-main); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        
        .header-controls { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }
        .global-search { width: 100%; max-width: 450px; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); outline: none; transition: 0.3s; }
        
        /* Inner scrolling for the lists */
        #nowServingGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; overflow-y: auto; padding-right: 10px; }
        #upNextList { overflow-y: auto; flex: 1; padding-right: 5px; }
        
        #clock { font-size: 1.2rem; font-weight: 800; color: var(--accent); min-width: 100px; text-align: right; }

        /* --- 3. RESPONSIVE ENGINE --- */
        
        /* Large TVs (Dynamically scale up text and cards) */
        @media (min-width: 1600px) {
            html { font-size: 1.1vw; }
            .main-content { grid-template-columns: 1fr 450px; } /* Makes the queue wider on big TVs */
        }

        /* Laptops & Split-Screen (Unlock scrolling, stack sections) */
        @media (max-width: 1024px) {
            body { height: auto !important; overflow: auto !important; }
            .main-content { grid-template-columns: 1fr !important; overflow: visible; padding: 15px; }
            .active-section, .queue-section { overflow: visible; }
            #nowServingGrid, #upNextList { overflow-y: visible; max-height: none; }
        }

        /* Mobile Phones (Restructure header, single column grid) */
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; gap: 15px; padding: 15px; }
            .header-controls { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            .global-search { max-width: 100%; order: 3; margin-top: 10px; }
            
            #nowServingGrid { grid-template-columns: 1fr; } /* Cards take full width */
            .now-serving-card { padding: 1.5rem; }
            .active-section { padding: 15px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="loading-text">WAKING UP SERVER...</div>
    </div>
    
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
    <h1 id="headerTitle" style="white-space: nowrap; margin: 0; font-weight: 800; letter-spacing: -1px;">🎓 PLACEMENT DRIVE</h1>
    
    <div class="header-controls" style="display: flex; align-items: center; gap: 15px;">
        <input type="text" id="globalSearch" onkeyup="globalFilter()" placeholder="🔍 Search name or room..." class="global-search" style="margin: 0;">
        
        <button onclick="toggleFullScreen()" title="Enter TV Mode" style="font-size: 1.5rem; background: transparent; border: none; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            📺
        </button>

        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode" style="font-size: 1.5rem; background: transparent; border: none; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            🌙
        </button>
        <div id="clock" style="margin-left: 10px;">12:00</div>
    </div>
</header>

    <div class="main-content">
        <div class="active-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color:var(--text-muted); margin:0; text-transform:uppercase; letter-spacing:2px; font-size: 0.9rem;">🟢 Now Interviewing</h3>
                <span id="activeCountBadge" style="background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800;">0 Active</span>
            </div>
            <div id="nowServingGrid"></div>
        </div>

        <div class="queue-section">
            <h3 style="color:var(--text-muted); margin:0 0 20px 0; text-transform:uppercase; letter-spacing:2px; font-size: 0.9rem;">⏳ Up Next</h3>
            <div id="upNextList"></div>
        </div>
    </div>

    <audio id="chimeSound" src="chime.mp3" preload="auto"></audio>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark-mode');
        })();

        // Hide Loader once initial data is fetched
        function hideLoader() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const toggleBtn = document.querySelector('.theme-toggle');
            if (savedTheme === 'dark' && toggleBtn) toggleBtn.innerText = '☀️';
            fetchUpdates(true); // Call first fetch with "true" to hide loader
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        // --- FULL SCREEN API LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                // Enter Fullscreen
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                // Exit Fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        function globalFilter() {
            const query = document.getElementById('globalSearch').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.now-serving-card, .queue-item');
            cards.forEach(card => {
                const nameText = (card.querySelector('.now-name') || card.querySelector('.queue-name')).textContent.toLowerCase();
                card.style.display = (nameText.includes(query) || card.innerText.toLowerCase().includes(query)) ? "" : "none";
            });
        }

        async function fetchUpdates(firstLoad = false) {
            try {
                // Fetch Company Name & Queue Data simultaneously
                const [metaRes, queueRes] = await Promise.all([
                    fetch('/get-company'),
                    fetch('/get-queue')
                ]);

                const metaData = await metaRes.json();
                const data = await queueRes.json();

                document.getElementById('headerTitle').innerText = `🎓 ${metaData.company}`;
                
                const grid = document.getElementById('nowServingGrid');
                const list = document.getElementById('upNextList');

                const interviewing = data.filter(s => s.status && s.status.toLowerCase() === 'interviewing');
                const waiting = data.filter(s => s.status && s.status.toLowerCase() === 'waiting');

                document.getElementById('activeCountBadge').innerText = `${interviewing.length} Active`;

                // --- 1. RENDER ACTIVE CARDS ---
                grid.innerHTML = interviewing.length === 0 
                    ? `<div style="grid-column:1/-1; text-align:center; padding:5rem; color:var(--text-muted); opacity: 0.5;"><div style="font-size: 3rem;">☕</div>No Active Interviews</div>`
                    : interviewing.map(s => {
                        const displayName = s.name || "Unknown";
                        const initials = displayName.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
                        const currentRoom = s.path[s.currentStep] || "Finish";
                        
                        // Progress Bar Math
                        const totalRounds = s.path.length;
                        const currentRoundNum = s.currentStep + 1;
                        const progressPercent = (currentRoundNum / totalRounds) * 100;
                        const nextStepText = s.path[s.currentStep + 1] ? `Next: ${s.path[s.currentStep + 1]}` : 'Final Round';
                        
                        return `
                        <div class="now-serving-card">
                            <div class="card-profile">
                                <div class="card-avatar">${initials}</div>
                                <div class="card-name-group">
                                    <span class="card-label">Candidate</span>
                                    <h2 class="now-name">${displayName}</h2>
                                </div>
                            </div>
                            <div class="card-room-box">
                                <span class="card-label">Currently At</span>
                                <span class="room-text">${currentRoom}</span>
                            </div>
                            
                            <div class="progress-container">
                                <div class="progress-text">
                                    <span>Round ${currentRoundNum} of ${totalRounds}</span>
                                    <span>${nextStepText}</span>
                                </div>
                                <div class="progress-track">
                                    <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');

                // --- 2. RENDER WAITING QUEUE ---
                list.innerHTML = waiting.length === 0
                    ? `<div class="empty-state" style="text-align:center; padding:2rem;"><div style="font-size:40px;">☕</div><p>All clear!</p></div>`
                    : waiting.map((s, i) => `
                        <div class="queue-item">
                            <div class="queue-left">
                                <div class="token-circle">${i+1}</div>
                                <div class="queue-name">${s.name}</div>
                            </div>
                            <div class="queue-room-badge">
                                ${s.path[s.currentStep] || "Waiting"}
                            </div>
                        </div>`).join('');

                if (firstLoad) hideLoader();
                globalFilter();
            } catch (err) { console.error(err); }
        }

        const socket = io();
        socket.on('queueUpdated', () => fetchUpdates());
        
        // Listener for the audio chime
        socket.on('playChime', () => {
            const chime = document.getElementById('chimeSound');
            chime.play().catch(err => console.log("Audio requires user interaction first."));
        });
    </script>
</body>
</html>
