<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚙️</text></svg>">
    
    <style>
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
.action-buttons button { flex: 1 1 calc(50% - 5px); padding: 10px !important; min-width: 120px; transition: 0.2s; }
    </style>
</head>
<body>
    

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-title">Title</h3>
            <p id="modal-desc">Description text goes here.</p>
            <input type="text" id="modal-input" style="display: none;">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-cancel">Cancel</button>
                <button id="modal-confirm" class="btn-primary">Confirm</button>
            </div>
        </div>
    </div>
    
    <header style="display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <button onclick="toggleSidebar()" style="font-size: 1.5rem; background: none; border: none; cursor: pointer; color: var(--text-main); transition: 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'" title="Toggle Sidebar">
            ☰
        </button>
        <h1 style="margin: 0; font-weight: 800; letter-spacing: -1px;">⚙️ Control Center</h1>
    </div>
    
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode" style="font-size: 1.5rem; background: transparent; border: none; outline: none; box-shadow: none; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        🌙
    </button>
</header>

    <div class="dashboard-container">
        <div class="sidebar">
            <button onclick="downloadExcel()" class="btn-primary" style="background: var(--success); color: white; margin-bottom: 1.5rem; font-weight: 800; border:none; width:100%;">
                📥 Download Final Report
            </button>

            <div style="background: var(--bg-main); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 1rem;">
                <div class="input-group">
                    <label>Current Company</label>
                    <input type="text" id="companyInput" placeholder="Ex: Google" style="margin-bottom: 12px;">
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" style="padding: 0.5rem;" onclick="updateCompany()">Set Branding</button>
                    <button type="button" style="background: var(--danger); color: white; border: none; padding: 0.5rem; border-radius: 8px; cursor: pointer; font-weight: 600;" onclick="clearCompany()">Clear</button>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 1.5rem;">

            <h3 style="color:var(--text-main);">Add Candidate</h3>
            <div class="input-group">
                <label>Name</label> <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Room Path</label> <input type="text" id="room" placeholder="203, 302, HR">
            </div>
            <button class="btn-primary" onclick="addStudent()">Add to Queue</button>
            
            <div style="margin-top: 1.5rem;">
                <label style="cursor: pointer; border: 2px dashed var(--border); padding: 1rem; border-radius: 8px; text-align: center; display: block; color: var(--text-muted); font-size: 0.85rem; transition: 0.2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
                    📂 <b>Upload Excel File</b><br>
                    <span style="font-size: 0.75rem; opacity: 0.8;">(.xlsx files only)</span>
                    <input type="file" id="excelFile" accept=".xlsx" onchange="handleExcelUpload()" style="display: none;">
                </label>
                <div id="uploadStatus" style="font-size: 0.8rem; color: var(--accent); text-align: center; margin-top: 5px; height: 15px;"></div>
            </div>

            <button onclick="resetSystem()" style="background: #ff4757; color: white; margin-top: 2rem; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 800; opacity: 0.6;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">
                🗑️ Reset System for New Drive
            </button>
        </div>

        <div class="main-content">
            <div class="stats-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem;">
                <div class="stat-card">
                    <span class="label">Total in Queue</span>
                    <span class="value" id="stat-total">0</span>
                </div>
                <div class="stat-card" style="border-top: 4px solid var(--success);">
                    <span class="label">Interviewing</span>
                    <span class="value" id="stat-active">0</span>
                </div>
                <div class="stat-card" style="border-top: 4px solid var(--warning);">
                    <span class="label">Waiting</span>
                    <span class="value" id="stat-waiting">0</span>
                </div>
                <div class="stat-card" style="border-top: 4px solid var(--primary);">
                    <span class="label">Current Drive</span>
                    <span class="value" id="stat-company" style="font-size: 1.1rem; line-height: 2.2;">-</span>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="font-size: 1.1rem; color: var(--text-muted); text-transform: uppercase;">Active Queue</h2>
                <button onclick="loadQueue()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;" title="Refresh List">🔄</button>
            </div>

            <div style="margin-bottom: 1.5rem; position: relative;">
                <input type="text" id="adminSearch" onkeyup="filterQueue()" placeholder="🔍 Search for candidate" 
                    style="width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-size: 0.95rem; outline: none; transition: 0.3s;"
                    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            </div>
            
            <div class="table-responsive-wrapper"></div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th> 
                        <th>Name</th> 
                        <th>Interview Path</th> <th>Status</th> 
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="adminList"></tbody>
            </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. GLOBAL SCOPE BINDING ---
        window.sendAction = sendAction;
        window.remove = remove;
        window.editPath = editPath;
        window.downloadExcel = downloadExcel;
        window.handleExcelUpload = handleExcelUpload;
        window.addStudent = addStudent;
        window.updateCompany = updateCompany;
        window.clearCompany = clearCompany;
        window.toggleTheme = toggleTheme;
        window.loadQueue = loadQueue;
        window.resetSystem = resetSystem;
        window.filterQueue = filterQueue;
        window.toggleSidebar = toggleSidebar;

        // --- 2. THEME & INITIALIZER ---
        

        async function initializeDashboard() {
            // Check local storage for theme and sidebar state
            const savedTheme = localStorage.getItem('theme');
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';

            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                const toggleBtn = document.querySelector('.theme-toggle');
                if (toggleBtn) toggleBtn.innerText = '☀️';
            }
            if (sidebarCollapsed) {
                const sidebar = document.querySelector('.sidebar');
                if (sidebar) sidebar.classList.add('collapsed');
            }

            try {
                // Define getCompany inside to fetch and update branding
                async function getCompany() {
                    const response = await fetch('/get-company');
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.company) {
                           document.getElementById('stat-company').innerText = data.company;
                           document.getElementById('companyInput').value = data.company;
                        }
                    }
                }

                // Race the data fetching against a timeout
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Request timed out after 3000ms')), 3000)
                );
                
                await Promise.race([
                    Promise.all([getCompany(), loadQueue()]),
                    timeoutPromise
                ]);

            } catch (error) {
                console.error('Dashboard initialization failed:', error);
            }
        }
        
        // Run the dashboard initialization immediately
        initializeDashboard();

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        // --- PREMIUM MODAL ENGINE (Fixed Duplication) ---
        function showModal(options) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('custom-modal');
                const title = document.getElementById('modal-title');
                const desc = document.getElementById('modal-desc');
                const input = document.getElementById('modal-input');
                const btnCancel = document.getElementById('modal-cancel');
                const btnConfirm = document.getElementById('modal-confirm');

                // Set content
                title.innerText = options.title;
                desc.innerText = options.desc || '';
                
                // Configure Input for Prompts
                if (options.type === 'prompt') {
                    input.style.display = 'block';
                    input.value = options.defaultVal || '';
                    setTimeout(() => input.focus(), 100); 
                } else {
                    input.style.display = 'none';
                }

                // Hide Cancel button for informational alerts
                if (options.infoOnly) {
                    btnCancel.style.display = 'none';
                } else {
                    btnCancel.style.display = 'inline-block';
                }

                // Configure Confirm Button
                btnConfirm.innerText = options.confirmText || 'Confirm';
                btnConfirm.style.background = options.danger ? 'var(--danger)' : 'var(--primary)';

                // Show Modal
                overlay.classList.remove('hidden');

                // Handle Close
                const cleanup = () => {
                    overlay.classList.add('hidden');
                    btnConfirm.onclick = null;
                    btnCancel.onclick = null;
                };

                btnCancel.onclick = () => { cleanup(); resolve(null); };
                btnConfirm.onclick = () => { 
                    cleanup(); 
                    resolve(options.type === 'prompt' ? input.value : true); 
                };
            });
        }

        // --- 3. COMPANY BRANDING (Confirm First) ---
        async function updateCompany() {
            const company = document.getElementById('companyInput').value;
            if(!company) return;

            const confirmChange = await showModal({
                title: "Update Branding?",
                desc: `Change the dashboard title to "${company}"?`,
                confirmText: "Update"
            });

            if(confirmChange) {
                await fetch('/set-company', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ company }) });
                document.getElementById('stat-company').innerText = company; 
                await showModal({
                    title: "Branding Updated",
                    desc: "The dashboard title has been changed successfully.",
                    confirmText: "Got it",
                    infoOnly: true 
                });
            }
        }


        async function clearCompany() { const defaultName = "Placement Drive"; await fetch('/set-company', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ company: defaultName }) }); document.getElementById('companyInput').value = ''; document.getElementById('stat-company').innerText = defaultName; }

        // --- 4. EXCEL UPLOAD LOGIC ---
        function handleExcelUpload() {
            const fileInput = document.getElementById('excelFile');
            const statusDiv = document.getElementById('uploadStatus');
            if (fileInput.files.length === 0) return;
            
            const file = fileInput.files[0];
            statusDiv.innerText = "Reading file..."; 
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.SheetNames[0];
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
                    
                    let studentsToUpload = [];

                    for(let row of jsonData) {
                        const getVal = (obj, keys) => {
                            const foundKey = Object.keys(obj).find(k => keys.includes(k.trim().toLowerCase()));
                            return foundKey ? obj[foundKey] : null;
                        };
                        const name = getVal(row, ['name', 'candidate name', 'student name', 'candidate']);
                        const room = getVal(row, ['room', 'path', 'location', 'rounds']) || "Waiting Area";
                        if(name) studentsToUpload.push({ name: String(name), room: String(room) });
                    }

                    if (studentsToUpload.length > 0) {
                        const confirmUpload = await showModal({
                            title: "Confirm Upload",
                            desc: `Found ${studentsToUpload.length} candidates in the Excel file. Add them to the live queue?`,
                            confirmText: "Upload Now"
                        });

                        if (confirmUpload) {
                            statusDiv.innerText = "Processing...";
                            const response = await fetch('/add-bulk-students', { 
                                method: 'POST', 
                                headers: {'Content-Type':'application/json'}, 
                                body: JSON.stringify({ students: studentsToUpload }) 
                            });

                            if (!response.ok) throw new Error("Server rejected the upload");

                            statusDiv.innerText = "Done!";
                            await showModal({
                                title: "Upload Successful",
                                desc: `✅ Added ${studentsToUpload.length} candidates to the queue.`,
                                confirmText: "Perfect",
                                infoOnly: true 
                            });
                        } else {
                            statusDiv.innerText = ""; 
                        }
                        
                    } else {
                        statusDiv.innerText = ""; 
                        await showModal({
                            title: "No Data Found",
                            desc: "We couldn't find any candidate names in that file.",
                            confirmText: "Close",
                            infoOnly: true
                        });
                    }

                } catch (err) {
                    console.error(err);
                    statusDiv.innerText = ""; 
                    await showModal({
                        title: "Upload Failed",
                        desc: "Error: " + err.message + ". (Press F12 and check the console for more details.)",
                        confirmText: "Close",
                        infoOnly: true
                    });
                } finally {
                    fileInput.value = "";     
                    loadQueue();              
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- 5. MANUAL ADD (No Confirmation) ---
        async function addStudent() {
            const name = document.getElementById('name').value;
            const room = document.getElementById('room').value;
            if(name) {
                await fetch('/add-student', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, room }) });
                document.getElementById('name').value = ''; 
                document.getElementById('room').value = ''; 
                loadQueue();
            }
        }

        // --- 6. LOAD QUEUE & ACTIONS ---
        async function loadQueue() {
            try {
                const res = await fetch('/get-queue');
                const data = await res.json();
                const list = document.getElementById('adminList');
                list.innerHTML = '';

                const activeCount = data.filter(s => s.status && s.status.toLowerCase() === 'interviewing').length;
                const waitingCount = data.filter(s => s.status && s.status.toLowerCase() === 'waiting').length;

                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-active').innerText = activeCount;
                document.getElementById('stat-waiting').innerText = waitingCount;

                if(data.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">Queue is empty</td></tr>';
                    return;
                }

                data.forEach((s, i) => {
                    const currentStatus = s.status ? s.status.toLowerCase() : '';
                    const pathDisplay = s.path.map((room, idx) => {
                        if (idx === s.currentStep) return `<b style="color:var(--accent); text-decoration:underline;">${room}</b>`;
                        return `<span style="opacity:0.5;">${room}</span>`;
                    }).join(' → ');

                    let btn = '';
                    if (currentStatus === 'waiting') {
                        btn = `<button type="button" class="btn-call" onclick="sendAction(${i}, 'call')">📢 Call In</button>`;
                    } else if (currentStatus === 'interviewing') {
                        btn = `<div style="display:flex; gap:5px; justify-content:flex-end;">
                                <button type="button" class="btn-done" style="background:var(--success); color:white; border:none;" onclick="sendAction(${i}, 'pass')">✅ Select</button>
                                <button type="button" class="btn-del" style="background:var(--danger); color:white; border:none;" onclick="sendAction(${i}, 'fail')">👎 Reject</button>
                               </div>`;
                    }

                    list.innerHTML += `<tr>
                        <td>${i+1}</td> 
                        <td style="font-weight:800;">${s.name}</td>
                        <td style="font-family: monospace;">${pathDisplay}</td>
                        <td><span class="badge ${currentStatus === 'waiting' ? 'badge-waiting' : 'badge-interviewing'}">${currentStatus === 'waiting' ? 'Waiting' : 'Inside Room'}</span></td>
                        <td style="text-align:right;">
                            <div style="display:flex; align-items:center; justify-content:flex-end; gap:12px;">
                                ${btn} 
                                <button type="button" title="Edit Path" onclick="editPath(${i})" style="background:none; border:none; cursor:pointer; font-size:1.3rem; opacity:0.9; transition:0.2s;">✏️</button>
                                <button type="button" title="Remove Student" onclick="remove(${i})" style="background:none; border:none; cursor:pointer; font-size:1.4rem; color:#ff4d4d; font-weight:bold; opacity:0.9; transition:0.2s;">✕</button>
                            </div>
                        </td>
                    </tr>`;
                });
                filterQueue();
            } catch (err) { console.error(err); }
        }

        async function sendAction(i, action) {
            await fetch('/update-status', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ index: i, action }) }); 
            loadQueue(); 
        }

        async function remove(i) { 
            const confirmDel = await showModal({
                title: "Remove Candidate?",
                desc: "Are you sure you want to remove this student from the active queue?",
                type: 'confirm',
                danger: true,
                confirmText: "Remove"
            });

            if(confirmDel) { 
                await fetch(`/remove-student/${i}`, { method: 'DELETE' }); 
                loadQueue(); 
            } 
        }

        async function editPath(index) {
            const res = await fetch('/get-queue');
            const data = await res.json();
            const student = data[index];
            const currentPathString = student.path.join(', ');
            
            const newPath = await showModal({
                title: `Edit Path: ${student.name}`,
                desc: "Update the interview rooms (comma separated):",
                type: 'prompt',
                defaultVal: currentPathString,
                confirmText: "Save Path"
            });

            if (newPath !== null && newPath.trim() !== "") {
                await fetch('/edit-student', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ index, newPath }) });
                loadQueue();
            }
        }

        async function resetSystem() {
            const confirmFirst = await showModal({
                title: "🚨 System Reset",
                desc: "This will permanently delete ALL candidates and history. This cannot be undone.",
                type: 'confirm',
                danger: true,
                confirmText: "Proceed to Delete"
            });
            
            if (confirmFirst) {
                const password = await showModal({
                    title: "Confirm Deletion",
                    desc: "Type the word RESET to confirm:",
                    type: 'prompt',
                    danger: true,
                    confirmText: "Wipe System"
                });
                
                if (password === 'RESET') {
                    await fetch('/reset-all', { method: 'POST' });
                    loadQueue(); 
                }
            }
        }

        // --- 7. SIDEBAR TOGGLE ---
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
            
            const isCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem('sidebarCollapsed', isCollapsed);
        }
        
        function downloadExcel() { window.location.href = '/download-excel'; }

        function filterQueue() {
            const query = document.getElementById('adminSearch').value.toLowerCase().trim();
            const rows = document.querySelectorAll('#adminList tr');
            rows.forEach(row => {
                const nameCell = row.cells[1];
                if (nameCell) row.style.display = nameCell.textContent.toLowerCase().includes(query) ? "" : "none";
            });
        }

        const socket = io();
        socket.on('queueUpdated', () => loadQueue());  
    </script>
</body>
</html>
